services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pinaco-smart-advisor-app
    restart: always
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgres://postgres:Password123!@db:5432/pinaco
      - JWT_SECRET=prod-super-secret-jwt-key-pinnacle-mw-2026
      - BCRYPT_ROUNDS=12
      - APP_URL=http://localhost:4000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    container_name: pinaco-smart-advisor-db
    restart: always
    environment:
      - POSTGRES_DB=pinaco
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Password123!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pinaco"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  postgres_data:
    driver: local

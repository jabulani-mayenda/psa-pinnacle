name: PINACO Smart Advisor CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  audit-build-test:
    name: Build, Lint & Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Static Analysis
        run: npx tsc --noEmit

      - name: Production Bundle Build
        run: npm run build

      - name: Execute Server Test Suite
        run: npm test

      - name: Database Migration Check
        run: npm run migrate:status
